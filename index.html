async function fetchSheet(id, name) {
  if (!id) return null;
  try {
    const r = await fetch(`https://docs.google.com/spreadsheets/d/${id}/gviz/tq?tqx=out:csv&sheet=${encodeURIComponent(name)}`);
    if (!r.ok) return null;
    return (await r.text()).split("\n").map(l=>l.replace(/^"|"$/g,"").trim()).filter(Boolean);
  } catch { return null; }
}

// ── localStorage 永続化カスタムフック
function useStickyState(defaultValue, key, reviver = null) {
  const [value, setValue] = useState(() => {
    const saved = window.localStorage.getItem(key);
    if (saved !== null) {
      try {
        const parsed = JSON.parse(saved);
        return reviver ? reviver(parsed) : parsed;
      } catch { return defaultValue; }
    }
    return defaultValue;
  });
  useEffect(() => {
    window.localStorage.setItem(key, JSON.stringify(value));
  }, [key, value]);
  return [value, setValue];
}

.del-btn{background:none;border:none;color:var(--mu);font-size:13px;cursor:pointer;flex-shrink:0;transition:color .15s}
.del-btn:hover{color:var(--red)}

/* SHARED */
.btn{flex:1;padding:11px 6px;border-radius:8px;border:1px solid var(--br);background:var(--s2);color:var(--tx);font-family:var(--fn);font-size:12px;font-weight:500;cursor:pointer;transition:all .15s}
.btn:hover{background:var(--s3);border-color:var(--blu)}
.btn.pri{background:var(--blu);border-color:var(--blu);color:#fff}
.btn.pri:hover{filter:brightness(1.1)}
.btn.gld{background:rgba(255,190,46,.1);border-color:var(--gld);color:var(--gld)}
.btn.full{width:100%;flex:none}
.acts{display:flex;gap:7px}
`;

  log:  <svg viewBox="0 0 24 24"><path d="M11 4H4a2 2 0 00-2 2v14a2 2 0 002 2h14a2 2 0 002-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 013 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>,
  shop: <svg viewBox="0 0 24 24"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg>,

  set:  <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 00.33 1.82l.06.06a2 2 0 010 2.83 2 2 0 01-2.83 0l-.06-.06a1.65 1.65 0 00-1.82-.33 1.65 1.65 0 00-1 1.51V21a2 2 0 01-4 0v-.09A1.65 1.65 0 009 19.4a1.65 1.65 0 00-1.82.33l-.06.06a2 2 0 01-2.83-2.83l.06-.06A1.65 1.65 0 004.68 15a1.65 1.65 0 00-1.51-1H3a2 2 0 010-4h.09A1.65 1.65 0 004.6 9a1.65 1.65 0 00-.33-1.82l-.06-.06a2 2 0 012.83-2.83l.06.06A1.65 1.65 0 009 4.68a1.65 1.65 0 001-1.51V3a2 2 0 014 0v.09a1.65 1.65 0 001 1.51 1.65 1.65 0 001.82-.33l.06-.06a2 2 0 012.83 2.83l-.06.06A1.65 1.65 0 0019.4 9a1.65 1.65 0 001.51 1H21a2 2 0 010 4h-.09a1.65 1.65 0 00-1.51 1z"/></svg>,

function Acc({ title, sub, children }) {
  const [open, setOpen] = useState(false);
  return (
    <div className="acc">
      <div className="acc-hdr" onClick={() => setOpen(o=>!o)}>
        <div><div className="acc-title">{title}</div>{sub&&<div className="acc-sub">{sub}</div>}</div>
        <span className={`acc-arrow ${open?"open":""}`}>▼</span>
      </div>
      <div className={`acc-body ${open?"open":""}`}>{children}</div>
    </div>
  );
}

function Grid({ opts, val, onChange, cols=3 }) {
  const cls = cols===2?"g2":cols===4?"g4":cols===5?"g5":"g3";
  return <div className={cls}>{opts.map(o=><div key={o} className={`ti ${val===o?"sel":""}`} onClick={()=>onChange(o)}>{o}</div>)}</div>;
}

function App() {
  const [screen, setScreen] = useState("home");
  const [ePhase, setEPhase] = useState("count");
  const [cnt,    setCnt]    = useState(6);
  const [bPhIdx, setBPhIdx] = useState(0);
  const [bTimer, setBTimer] = useState(2);
  const [bCycle, setBCycle] = useState(0);
  const [praise, setPraise] = useState("");
  const [img,    setImg]    = useState("");
  const [imgErr, setImgErr] = useState(false);

  // 永続化ステート
  const [logs,    setLogs]    = useStickyState(SAMPLE,     "af_logs",    arr => Array.isArray(arr) ? arr.map(l=>({...l,date:new Date(l.date)})) : SAMPLE);
  const [shop,    setShop]    = useStickyState(INIT_SHOP,  "af_shop");
  const [shopPts, setShopPts] = useStickyState(0,          "af_shopPts");
  const [sheetId, setSheetId] = useStickyState("",         "af_sheetId");
  const [praises, setPraises] = useStickyState(FB_PRAISES, "af_praises");
  const [loses,   setLoses]   = useStickyState(FB_LOSES,   "af_loses");
  const [imgs,    setImgs]    = useStickyState(FB_IMGS,     "af_imgs");

  // 一時ステート
  const [congrats,   setCongrats]   = useState(null);
  const [newName,    setNewName]    = useState("");
  const [newPtsStr,  setNewPtsStr]  = useState("");
  const [editingId,  setEditingId]  = useState(null);
  const [editName,   setEditName]   = useState("");
  const [editPtsStr, setEditPtsStr] = useState("");
  const [syncSt,     setSyncSt]     = useState("");
  const [homeLoses,  setHomeLoses]  = useState(() => s3(loses));
  const [newLose,    setNewLose]    = useState("");
  const [newImgUrl,  setNewImgUrl]  = useState("");
  const [newPraise,  setNewPraise]  = useState("");

  const bph    = BREATH[bPhIdx];
  const earned = totalPts(logs);
  const avail  = earned - shopPts;
  const tWins  = todayWins(logs);
  const aWins  = logs.filter(l=>!l.reacted).length;

  // カウントダウン
  useEffect(() => {
    if (ePhase !== "count") return;
    if (cnt <= 0) { startBreathe(); return; }
    const t = setTimeout(() => setCnt(c=>c-1), 1000);
    return () => clearTimeout(t);
  }, [ePhase, cnt]);

  // 呼吸
  useEffect(() => {
    if (ePhase !== "breathe") return;
    if (bTimer <= 0) {
      const ni = bPhIdx + 1;
      if (ni >= BREATH.length) {
        const nc = bCycle + 1;
        if (nc >= 3) { showReward(); return; }
        setBCycle(nc); setBPhIdx(0); setBTimer(BREATH[0].dur);
      } else { setBPhIdx(ni); setBTimer(BREATH[ni].dur); }
      return;
    }
    const t = setTimeout(() => setBTimer(b=>b-1), 1000);
    return () => clearTimeout(t);
  }, [ePhase, bTimer, bPhIdx, bCycle]);

  const startBreathe = () => { setEPhase("breathe"); setBPhIdx(0); setBTimer(BREATH[0].dur); setBCycle(0); };
  const showReward   = useCallback(() => {
    setPraise(rnd(praises)); setImg(rnd(imgs.length?imgs:FB_IMGS));
    setImgErr(false); setEPhase("reward");
  }, [praises, imgs]);

  const startEmergency = useCallback(() => {
    setHomeLoses(s3(loses));
    setScreen("emergency"); setEPhase("count"); setCnt(6);
  }, [loses]);

  // 記録フォーム
  const EF = { time:"朝", place:"", fact:"", action:"無言で耐えた", monsterType:"害虫",
    skill:"", weakness:"", scale:"等身大（個人）", color:"爆発の赤🔴", intensity:70,
    sound:"", fantasy:"", quote:"", ending:"ギャグ化して消滅", title:"", reacted:false };
  const [lf, setLf] = useState(EF);
  const F = (k,v) => setLf(f=>({...f,[k]:v}));

  const saveLog = () => {
    setLogs(p => [{ id:Date.now(), ...lf, date:new Date() }, ...p]);
    setLf(EF); setScreen("home");
  };

  // ショップ操作
  const addShopItem = () => {
    const p = parseInt(newPtsStr);
    if (!newName.trim() || isNaN(p) || p <= 0) return;
    setShop(s => [...s, { id:Date.now(), name:newName.trim(), pts:p }]);
    setNewName(""); setNewPtsStr("");
  };
  const deleteItem = id => setShop(s => s.filter(i=>i.id!==id));
  const startEdit  = item => { setEditingId(item.id); setEditName(item.name); setEditPtsStr(String(item.pts)); };
  const saveEdit   = () => {
    const p = parseInt(editPtsStr);
    if (!editName.trim() || isNaN(p) || p <= 0) return;
    setShop(s => s.map(i => i.id===editingId ? {...i,name:editName.trim(),pts:p} : i));
    setEditingId(null);
  };
  const exchange = item => {
    if (avail < item.pts) return;
    setShopPts(p => p + item.pts);
    setCongrats({ name:item.name, pts:item.pts, remaining:avail - item.pts });
  };

  // スプシ同期
  const syncSheet = async id => {
    if (!id) { setSyncSt("err"); return; }
    setSyncSt("loading");
    const [p,l,i] = await Promise.all([
      fetchSheet(id,"褒め言葉"), fetchSheet(id,"失うもの"), fetchSheet(id,"画像URL"),
    ]);
    if (!p&&!l&&!i) { setSyncSt("err"); return; }
    if (p?.length) setPraises(p);
    if (l?.length) { setLoses(l); setHomeLoses(s3(l)); }
    if (i?.length) setImgs(i);
    setSyncSt("ok");
    setTimeout(() => setSyncSt(""), 3000);
  };

  // CSV
  const downloadCSV = () => {
    const h = "日時,時刻,場所,事実,対応,敵属性,必殺技,弱点,スケール,色,強度,音,妄想,捨て台詞,結末,タイトル,結果,P";
    const rows = logs.map(l=>[
      new Date(l.date).toLocaleString("ja-JP"), l.time,
      esc(l.place), esc(l.fact), l.action, l.monsterType,
      esc(l.skill), esc(l.weakness), l.scale, l.color, l.intensity,
      esc(l.sound), esc(l.fantasy), esc(l.quote), l.ending, esc(l.title),
      l.reacted?"行動した":"勝利", calcPts(l),
    ].join(","));
    const b = new Blob([[h,...rows].join("\n")],{type:"text/csv;charset=utf-8;"});
    const a = document.createElement("a"); a.href=URL.createObjectURL(b); a.download="angerforge.csv"; a.click();
  };

  const previewPts = lf.reacted ? 0 : Math.round(lf.intensity/10)*10;
  const navs = [
    {id:"home",icon:IC.home,lbl:"ホーム"},
    {id:"form",icon:IC.log, lbl:"記録"},
    {id:"shop",icon:IC.shop,lbl:"ポイント"},
    {id:"logs",icon:IC.logs,lbl:"ログ"},
    {id:"set", icon:IC.set, lbl:"設定"},
  ];

  return (
    <>
      <style>{CSS}</style>
      <div className="app">

        {/* おめでとうオーバーレイ */}
        {congrats && (
          <div className="overlay">
            <div className="ov-emoji">🎉</div>
            <div className="ov-title">おめでとう！</div>
            <div className="ov-sub">{congrats.name}<br/>と交換しました</div>
            <div className="ov-pts">-{congrats.pts.toLocaleString()}P 消費 · 残り {congrats.remaining.toLocaleString()}P</div>
            <button className="btn pri" style={{maxWidth:180,marginTop:8}} onClick={()=>setCongrats(null)}>閉じる</button>
          </div>
        )}

        <div className="hdr">
          <span className="logo">ANGERFORGE</span>
          <div className="hdr-r">
            <span className="badge gold">★ {avail.toLocaleString()}P</span>
            <span className="badge grn">今日 {tWins}勝</span>
          </div>
        </div>

        <div className="scr">

          {/* HOME */}
          {screen==="home" && (
            <div className="home">
              <button className="pbtn" onClick={startEmergency}>
                <span className="pb-main">心を整える</span>
                <span className="pb-sub">タップして深呼吸へ</span>
              </button>
              <div className="lose-wrap">
                {homeLoses.map((t,i) => (
                  <div className="lose-item" key={i}>
                    <span className="lose-n">{i+1}</span>
                    <span className="lose-t">{t}</span>
                  </div>
                ))}
              </div>
              <div className="hstats">
                <div className="hsc"><span className="hscv" style={{color:"var(--grn)"}}>{tWins}</span><span className="hscl">今日の勝利</span></div>
                <div className="hsc"><span className="hscv" style={{color:"var(--blu)"}}>{aWins}</span><span className="hscl">累計勝利</span></div>
                <div className="hsc"><span className="hscv" style={{color:"var(--gld)"}}>{avail.toLocaleString()}</span><span className="hscl">残りP</span></div>
              </div>
            </div>
          )}

          {/* EMERGENCY: カウント */}
          {screen==="emergency" && ePhase==="count" && (
            <div className="emrg">
              <div style={{fontSize:11,letterSpacing:3,color:"var(--mu)",fontWeight:700}}>HOLD ON</div>
              <div className="cnt-num">{cnt}</div>
              <div className="cnt-bar-wrap"><div className="cnt-bar" style={{width:`${((6-cnt)/6)*100}%`}}/></div>
              <div className="cnt-msg">この{cnt}秒だけやり過ごす<br/><b>動かない = 勝利</b></div>
              <button className="skip-link" onClick={startBreathe}>スキップ →</button>
            </div>
          )}

          {/* EMERGENCY: 呼吸 */}
          {screen==="emergency" && ePhase==="breathe" && (
            <div className="emrg">
              <div>
                <div style={{fontSize:11,letterSpacing:3,color:"rgba(128,188,255,.6)",fontWeight:700}}>生理的ため息</div>
                <div style={{fontSize:11,color:"var(--mu)",marginTop:3}}>Stanford研究・最速の鎮静法</div>
              </div>
              <div style={{width:220,height:220,display:"flex",alignItems:"center",justifyContent:"center"}}>
                <div className="bc" style={{transform:`scale(${bph.scale})`}}>
                  <span className="bc-ph">{bph.label}</span>
                  <span className="bc-t">{bTimer}</span>
                </div>
              </div>
              <div className="bc-hint">
                {bPhIdx===0 && "👃 鼻からゆっくり吸う"}
                {bPhIdx===1 && "👃 もう一口、追加で吸い込む"}
                {bPhIdx===2 && "👄 口から細く長く吐き出す…"}
              </div>
              <div className="bc-dots">{[0,1,2].map(i=><div key={i} className={`bcd ${i<bCycle?"done":""}`}/>)}</div>
              <button className="skip-link" onClick={showReward}>スキップ</button>
            </div>
          )}

          {/* EMERGENCY: ご褒美 */}
          {screen==="emergency" && ePhase==="reward" && (
            <div className="rew-wrap">
              <div className="rew-img-zone">
                {imgErr ? <div className="rew-fallback">🐕</div>
                  : <img className="rew-img" src={img} alt="" onError={()=>setImgErr(true)}/>}
                <div className="rew-overlay"><div className="rew-crown">🏆 今日も勝利した</div></div>
              </div>
              <div className="praise-zone">
                <div className="praise-txt">{praise}</div>
                <div className="praise-pts">★ +{Math.round(lf.intensity/10)*10}P 獲得見込み</div>
              </div>
              <div className="rew-acts">
                <button className="btn" onClick={()=>{setPraise(rnd(praises));setImg(rnd(imgs.length?imgs:FB_IMGS));setImgErr(false);}}>🔄</button>
                <button className="btn" onClick={()=>setScreen("form")}>📝 記録する</button>
                <button className="btn gld" onClick={()=>setScreen("home")}>完了 ✓</button>
              </div>
            </div>
          )}

          {/* LOG FORM */}
          {screen==="form" && (
            <div style={{display:"flex",flexDirection:"column",height:"100%"}}>
              <div className="shdr"><h2>事件を記録する</h2><p>15設問で創作素材に変換</p></div>
              <div className="scon" style={{flex:1,overflowY:"auto"}}>
                <div>
                  <div className="sec">今日の結果</div>
                  <div className="rtog" style={{marginBottom:8}}>
                    <div className={`ropt ${!lf.reacted?"win":""}`} onClick={()=>F("reacted",false)}>✓ 乗り越えた！</div>
                    <div className={`ropt ${lf.reacted?"lose":""}`} onClick={()=>F("reacted",true)}>次は勝てる</div>
                  </div>
                  <div className="pts-pre">
                    <span className="pp-l">獲得ポイント</span>
                    <span className="pp-v" style={{color:previewPts>0?"var(--gld)":"var(--mu)"}}>{previewPts>0?`★ ${previewPts}P`:"0P"}</span>
                  </div>
                </div>
                <hr className="divider"/>
                <div className="cat-hdr">📋 FACT — 事実</div>
                <div><div className="sec">① 発生時刻</div><Grid opts={TIME_OPTS} val={lf.time} onChange={v=>F("time",v)} cols={5}/></div>
                <div><div className="sec">② 場所・状況</div><textarea className="tinp" rows="2" placeholder="例：品川駅ホーム" value={lf.place} onChange={e=>F("place",e.target.value)}/></div>
                <div><div className="sec">③ トリガーの事実</div><textarea className="tinp" rows="2" placeholder="例：横入りされた" value={lf.fact} onChange={e=>F("fact",e.target.value)}/></div>
                <div><div className="sec">④ 実際の対応</div><Grid opts={ACTION_OPTS} val={lf.action} onChange={v=>F("action",v)} cols={2}/></div>
                <hr className="divider"/>
                <div className="cat-hdr">🎴 ENEMY — 敵キャラ分析</div>
                <div><div className="sec">⑤ 敵の属性</div><Grid opts={MONSTER_OPTS} val={lf.monsterType} onChange={v=>F("monsterType",v)} cols={4}/></div>
                <div><div className="sec">⑥ 必殺技</div><textarea className="tinp" rows="2" placeholder="例：終わらない自慢話" value={lf.skill} onChange={e=>F("skill",e.target.value)}/></div>
                <div><div className="sec">⑦ 弱点・ダサい所</div><textarea className="tinp" rows="2" placeholder="例：上にはペコペコ" value={lf.weakness} onChange={e=>F("weakness",e.target.value)}/></div>
                <div><div className="sec">⑧ スケール感</div><Grid opts={SCALE_OPTS} val={lf.scale} onChange={v=>F("scale",v)} cols={3}/></div>
                <hr className="divider"/>
                <div className="cat-hdr">💥 EXPLOSION — 本音</div>
                <div><div className="sec">⑨ 怒りの色</div><Grid opts={COLOR_OPTS} val={lf.color} onChange={v=>F("color",v)} cols={3}/></div>
                <div>
                  <div className="sec">⑩ 強度（1〜100）</div>
                  <div className="intr">
                    <span className="intv" style={{color:lf.intensity>=70?"var(--red)":lf.intensity>=40?"var(--gld)":"var(--grn)"}}>{lf.intensity}</span>
                    <input type="range" min="1" max="100" step="1" value={lf.intensity} className="slider"
                      style={{background:`linear-gradient(to right,var(--blu) ${lf.intensity}%,var(--br) ${lf.intensity}%)`}}
                      onChange={e=>F("intensity",+e.target.value)}/>
                  </div>
                </div>
                <div><div className="sec">⑪ 怒りの「音」</div><textarea className="tinp" rows="2" placeholder="例：ガラスが割れる音" value={lf.sound} onChange={e=>F("sound",e.target.value)}/></div>
                <div><div className="sec">⑫ 制約なく解消するなら <span className="hint">法律無視OK</span></div><textarea className="tinp" rows="2" placeholder="例：顔面にパイを投げる" value={lf.fantasy} onChange={e=>F("fantasy",e.target.value)}/></div>
                <hr className="divider"/>
                <div className="cat-hdr">🎯 CATHARSIS — 決着</div>
                <div><div className="sec">⑬ 捨て台詞</div><textarea className="tinp" rows="2" placeholder="例：二度と話しかけんな" value={lf.quote} onChange={e=>F("quote",e.target.value)}/></div>
                <div><div className="sec">⑭ 望む結末</div><Grid opts={END_OPTS} val={lf.ending} onChange={v=>F("ending",v)} cols={2}/></div>
                <div><div className="sec">⑮ 事件タイトル</div><textarea className="tinp" rows="1" placeholder="例：品川駅・横入りおじさん討伐戦" value={lf.title} onChange={e=>F("title",e.target.value)}/></div>
                <div className="acts" style={{paddingBottom:8}}>
                  <button className="btn" onClick={()=>setScreen("home")}>キャンセル</button>
                  <button className="btn pri" onClick={saveLog}>★ 記録して{previewPts}P獲得</button>
                </div>
              </div>
            </div>
          )}

          {/* SHOP — UIを横並びに変更して崩れを修正 */}
          {screen==="shop" && (
            <div style={{display:"flex",flexDirection:"column",height:"100%"}}>
              <div className="shop-header"><h2>勝利ポイント & ご褒美</h2><p>乗り越えた分だけ、自分に贈る</p></div>
              <div className="scon" style={{flex:1,overflowY:"auto"}}>

                {/* ポイントヒーロー：横並びで数値が大きくても崩れない */}
                <div className="pts-hero">
                  <div className="pts-hero-left">
                    <span className="pts-hero-num">{avail.toLocaleString()}</span>
                    <div className="pts-hero-label">★ 使えるポイント</div>
                    <div className="pts-hero-sub">獲得 {earned.toLocaleString()}P − 消費 {shopPts.toLocaleString()}P</div>
                  </div>
                  <div className="pts-hero-right">
                    <div className="pts-mini">
                      <span className="pts-mini-v" style={{color:"var(--grn)"}}>{tWins}</span>
                      <div className="pts-mini-l">今日の勝利</div>
                    </div>
                    <div className="pts-mini">
                      <span className="pts-mini-v" style={{color:"var(--blu)"}}>{aWins}</span>
                      <div className="pts-mini-l">累計勝利</div>
                    </div>
                  </div>
                </div>

                {/* アイテム追加 */}
                <div className="add-form">
                  <div style={{fontSize:10,fontWeight:700,letterSpacing:2,color:"var(--mu)",textTransform:"uppercase",marginBottom:8}}>＋ アイテム追加</div>
                  <div className="add-row">
                    <input className="sinp" placeholder="ご褒美の名前" value={newName} onChange={e=>setNewName(e.target.value)}
                      onKeyDown={e=>{if(e.key==="Enter")addShopItem();}}/>
                    <input className="sinp pts-inp" placeholder="P数" type="number" min="1" value={newPtsStr} onChange={e=>setNewPtsStr(e.target.value)}
                      onKeyDown={e=>{if(e.key==="Enter")addShopItem();}}/>
                  </div>
                  <button className="btn pri full" style={{padding:9,fontSize:12}} onClick={addShopItem}>追加する</button>
                </div>

                {/* アイテム一覧 */}
                <div style={{display:"flex",flexDirection:"column",gap:8}}>
                  {shop.map(item => {
                    const pct = Math.min(100, Math.round(avail/item.pts*100));
                    const canExchange = avail >= item.pts;
                    if (editingId === item.id) {
                      return (
                        <div key={item.id} className="shop-item">
                          <div className="add-row">
                            <input className="sinp" value={editName} onChange={e=>setEditName(e.target.value)}/>
                            <input className="sinp pts-inp" type="number" min="1" value={editPtsStr} onChange={e=>setEditPtsStr(e.target.value)}/>
                          </div>
                          <div className="acts">
                            <button className="btn" onClick={()=>setEditingId(null)}>キャンセル</button>
                            <button className="btn pri" onClick={saveEdit}>保存</button>
                          </div>
                        </div>
                      );
                    }
                    return (
                      <div key={item.id} className="shop-item">
                        <div className="si-top">
                          <span className="si-name">{item.name}</span>
                          <span className="si-pts">{item.pts.toLocaleString()}P</span>
                        </div>
                        <div className="si-bar"><div className="si-fi" style={{width:`${pct}%`}}/></div>
                        <div className="si-bot">
                          <span className="si-pct">{canExchange?"🎉 交換できる！":`${avail.toLocaleString()} / ${item.pts.toLocaleString()}P (${pct}%)`}</span>
                          <div className="si-actions">
                            <button className="si-btn exchange" disabled={!canExchange} onClick={()=>exchange(item)}>交換</button>
                            <button className="si-btn" onClick={()=>startEdit(item)}>編集</button>
                            <button className="si-btn danger" onClick={()=>deleteItem(item.id)}>削除</button>
                          </div>
                        </div>
                      </div>
                    );
                  })}
                </div>

                <div style={{background:"rgba(85,153,255,.05)",border:"1px solid rgba(85,153,255,.13)",borderRadius:10,padding:12,fontSize:11,color:"var(--mu)",lineHeight:1.75}}>
                  💡 1回の勝利 = 強度÷10×10P（最大100P）<br/>
                  6回乗り越えると ≈ 420〜600P
                </div>
              </div>
            </div>
          )}

          {/* LOGS */}
          {screen==="logs" && (
            <div style={{display:"flex",flexDirection:"column",height:"100%"}}>
              <div className="shdr"><h2>勝利ログ</h2><p>CSV → GeminiでNo.1は漫画、No.2は小説…</p></div>
              <div className="scon" style={{flex:1,overflowY:"auto"}}>
                <button className="btn full" style={{padding:12}} onClick={downloadCSV}>📥 CSVダウンロード</button>
                <div style={{background:"rgba(255,190,46,.05)",border:"1px solid rgba(255,190,46,.15)",borderRadius:10,padding:12,fontSize:11,color:"var(--mu)",lineHeight:1.75}}>
                  📌 Geminiへの渡し方<br/>
                  CSVを添付して「No.1は漫画に」「No.2は小説に」<br/>「No.3と4はSuno向けの歌詞作って」
                </div>
                <div style={{display:"flex",flexDirection:"column",gap:6}}>
                  {logs.map(l=>(
                    <div key={l.id} className="log-item">
                      <div className="ib" style={{background:"rgba(255,190,46,.1)",color:"var(--gld)"}}>{l.intensity}</div>
                      <div className="ldet">
                        <div className="lt">{l.title||l.fact||"記録"}</div>
                        <div className="lm">{ago(l.date)} · {l.time} · {l.place}</div>
                        {l.quote&&<div className="lm" style={{color:"rgba(221,224,255,.5)"}}>「{l.quote.slice(0,20)}…」</div>}
                        <div className="ltags">
                          {l.monsterType&&<span className="ltag">🎴{l.monsterType}</span>}
                          {calcPts(l)>0&&<span className="ltag" style={{color:"var(--gld)",borderColor:"rgba(255,190,46,.3)"}}>★{calcPts(l)}P</span>}
                        </div>
                      </div>
                      <span className="rtag" style={{background:l.reacted?"var(--rlo)":"rgba(46,204,132,.07)",color:l.reacted?"#ff9090":"var(--grn)"}}>
                        {l.reacted?"次は勝つ":"✓勝利"}
                      </span>
                    </div>
                  ))}
                </div>
              </div>
            </div>
          )}

          {/* SETTINGS */}
          {screen==="set" && (
            <div style={{display:"flex",flexDirection:"column",height:"100%"}}>
              <div className="shdr"><h2>設定</h2><p>スプシ連携で永続管理</p></div>
              <div className="scon" style={{flex:1,overflowY:"auto"}}>

                <Acc title="📊 スプレッドシート連携" sub="褒め言葉・失うもの・画像を一括管理">
                  <p style={{fontSize:11,color:"var(--mu)",lineHeight:1.7,marginBottom:10}}>
                    スプシIDを貼って「読み込む」だけ。<br/>シート名：「褒め言葉」「失うもの」「画像URL」
                  </p>
                  <input className="sinp" style={{width:"100%",marginBottom:8}} placeholder="スプレッドシートID" value={sheetId} onChange={e=>setSheetId(e.target.value)}/>
                  <button className="btn pri full" style={{padding:9,fontSize:12}} onClick={()=>syncSheet(sheetId)}>🔄 スプシから読み込む</button>
                  {syncSt==="ok"      && <div style={{fontSize:11,marginTop:6,color:"var(--grn)"}}>✓ 同期成功</div>}
                  {syncSt==="err"     && <div style={{fontSize:11,marginTop:6,color:"#ff9090"}}>✗ 失敗（公開設定・シート名を確認）</div>}
                  {syncSt==="loading" && <div style={{fontSize:11,marginTop:6,color:"var(--mu)"}}>読み込み中…</div>}
                </Acc>

                <Acc title="🏆 褒め言葉" sub={`${praises.length}件`}>
                  <div className="tag-list">
                    {praises.map((t,i)=><div key={i} className="tag-row"><span>{t}</span><button className="del-btn" onClick={()=>setPraises(p=>p.filter((_,j)=>j!==i))}>✕</button></div>)}
                  </div>
                  <input className="sinp" style={{width:"100%",marginBottom:6}} placeholder="新しい褒め言葉…" value={newPraise} onChange={e=>setNewPraise(e.target.value)}
                    onKeyDown={e=>{if(e.key==="Enter"&&newPraise.trim()){setPraises(p=>[...p,newPraise.trim()]);setNewPraise("");}}}/>
                  <button className="btn pri full" style={{padding:8,fontSize:11}} onClick={()=>{if(newPraise.trim()){setPraises(p=>[...p,newPraise.trim()]);setNewPraise("");}}}>＋ 追加</button>
                </Acc>

                <Acc title="⚡ 失うものリスト" sub={`${loses.length}件・ホームにランダム3つ表示`}>
                  <div className="tag-list">
                    {loses.map((t,i)=><div key={i} className="tag-row"><span>{t}</span><button className="del-btn" onClick={()=>setLoses(p=>p.filter((_,j)=>j!==i))}>✕</button></div>)}
                  </div>
                  <input className="sinp" style={{width:"100%",marginBottom:6}} placeholder="新しい項目…" value={newLose} onChange={e=>setNewLose(e.target.value)}
                    onKeyDown={e=>{if(e.key==="Enter"&&newLose.trim()){setLoses(p=>[...p,newLose.trim()]);setNewLose("");}}}/>
                  <button className="btn pri full" style={{padding:8,fontSize:11}} onClick={()=>{if(newLose.trim()){setLoses(p=>[...p,newLose.trim()]);setNewLose("");}}}>＋ 追加</button>
                </Acc>

                <Acc title="📸 ご褒美写真URL" sub={`${imgs.length}枚`}>
                  <p style={{fontSize:11,color:"var(--mu)",lineHeight:1.6,marginBottom:8}}>
                    GoogleドライブURL形式：<br/>
                    <code style={{fontSize:10,background:"var(--s2)",padding:"1px 5px",borderRadius:4}}>drive.google.com/uc?export=view&id=【ID】</code>
                  </p>
                  <div className="tag-list">
                    {imgs.map((u,i)=><div key={i} className="tag-row"><span style={{fontSize:10}}>{u.slice(0,40)}…</span><button className="del-btn" onClick={()=>setImgs(p=>p.filter((_,j)=>j!==i))}>✕</button></div>)}
                  </div>
                  <input className="sinp" style={{width:"100%",marginBottom:6}} placeholder="https://..." value={newImgUrl} onChange={e=>setNewImgUrl(e.target.value)}
                    onKeyDown={e=>{if(e.key==="Enter"&&newImgUrl.trim()){setImgs(p=>[...p,newImgUrl.trim()]);setNewImgUrl("");}}}/>
                  <button className="btn pri full" style={{padding:8,fontSize:11}} onClick={()=>{if(newImgUrl.trim()){setImgs(p=>[...p,newImgUrl.trim()]);setNewImgUrl("");}}}>＋ 追加</button>
                </Acc>

              </div>
            </div>
          )}

        </div>

        {!(screen==="emergency" && ePhase==="count") && (
          <div className="nav">
            {navs.map(({id,icon,lbl})=>(
              <button key={id} className={`nb ${screen===id?"act":""}`} onClick={()=>setScreen(id)}>{icon}{lbl}</button>
            ))}
          </div>
        )}
      </div>
    </>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
